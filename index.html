<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Syncora Panel | Giris</title><link rel="stylesheet" href="/styles.css"></head><body class="login-screen"><main class="login-layout"><section class="login-copy"><img id="brandLogo" src="/syncora-pp.png" alt="Syncora"><p class="eyebrow">Syncora Roleplay</p><h1 id="brandName">Ortak Panel</h1><p data-i18n="heroCopy">Gmail ve sifre ile giris yap. Discord hesabini panelin icinden sol alttaki baglanti alaniyla eslestir.</p><div class="login-metrics"><span data-i18n="metricLiveServer">Live server</span> <span data-i18n="metricSharedRecords">Shared records</span> <span data-i18n="metricDiscordLink">Discord link</span></div></section><section class="login-card"><div class="auth-tabs" role="tablist"><button class="active" type="button" data-auth-tab="login" data-i18n="login">Giris</button> <button type="button" data-auth-tab="register" data-i18n="register">Kayit</button></div><p class="notice hidden" id="authNotice"></p><form id="loginForm" class="auth-form" action="/api/auth/login" method="post"><label><span data-i18n="email">Gmail</span> <input name="email" inputmode="email" placeholder="ornek@gmail.com" autocomplete="email" required></label> <label><span data-i18n="password">Sifre</span> <input name="password" type="password" autocomplete="current-password" required></label> <label class="hidden" id="twoFactorField"><span>2FA kodu</span> <input name="twoFactorCode" inputmode="numeric" autocomplete="one-time-code" pattern="[0-9]{6}"></label><div class="auth-options"><label class="inline-check"><input name="remember" id="rememberLogin" type="checkbox"> <span data-i18n="remember">Beni sonraki giriste hatirla</span></label> <button class="link-btn" type="button" id="forgotPasswordBtn" data-i18n="forgotPassword">Sifremi unuttum</button></div><button class="primary-btn" type="submit" data-i18n="login">Giris yap</button></form><form id="registerForm" class="auth-form hidden" action="/api/auth/register" method="post"><label><span data-i18n="name">Panel adi</span> <input name="name" autocomplete="name" required></label> <label><span data-i18n="email">Gmail</span> <input name="email" inputmode="email" placeholder="ornek@gmail.com" autocomplete="email" required></label> <label><span data-i18n="password">Sifre</span> <input name="password" type="password" autocomplete="new-password" minlength="6" required></label> <label class="hidden" id="inviteField"><span data-i18n="inviteCode">Davet kodu</span> <input name="inviteCode" autocomplete="off"></label> <button class="primary-btn" type="submit" data-i18n="createAccount">Hesap olustur</button></form><form id="resetRequestForm" class="auth-form hidden" action="/api/auth/password-reset/request" method="post"><label><span data-i18n="email">Gmail</span> <input name="email" inputmode="email" placeholder="ornek@gmail.com" autocomplete="email" required></label> <button class="primary-btn" type="submit" data-i18n="resetCodeGet">Sifirlama kodu gonder</button> <button class="ghost-btn" type="button" data-auth-back="login" data-i18n="backToLogin">Girise don</button></form><form id="resetConfirmForm" class="auth-form hidden" action="/api/auth/password-reset/confirm" method="post"><label><span data-i18n="email">Gmail</span> <input name="email" id="resetConfirmEmail" inputmode="email" readonly="readonly" required></label> <label><span data-i18n="resetCode">Sifirlama kodu</span> <input name="resetCode" inputmode="numeric" autocomplete="one-time-code" required></label> <label><span data-i18n="newPassword">Yeni sifre</span> <input name="password" type="password" autocomplete="new-password" minlength="6" required></label> <label><span data-i18n="newPasswordConfirm">Tekrar yeni sifre</span> <input name="passwordConfirm" type="password" autocomplete="new-password" minlength="6" required></label> <button class="primary-btn" type="submit" data-i18n="saveNewPassword">Yeni sifreyi kaydet</button> <button class="ghost-btn" type="button" data-auth-back="login" data-i18n="backToLogin">Girise don</button></form><div class="language-strip"><button type="button" data-lang="tr">TR</button> <button type="button" data-lang="en">EN</button> <button type="button" data-lang="ru">RS</button></div></section></main><script src="/auth.js"></script></body></html>
